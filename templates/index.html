<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllMarket</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index_styles.css') }}">=
    <link rel="stylesheet" href="https://unpkg.com/98.css" />
</head>
<body>
    <h1 class="am-title" id="am-title">AllMarket</h1>
    <p class="am-quote">“The biggest risk is not taking any risk.” - Mark Zuckerberg, 2011</p>
    <hr>
    <form action="/submit" method="POST">
        <input type="text" name="username" placeholder="Username">
        <button type="submit">Submit</button>
    </form>
    {% if users %}
        <ul>
            {% for user in users %}
                <li>{{ user.username }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No users yet.</p>
    {% endif %}
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
